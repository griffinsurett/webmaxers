<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmos — A Journey Through the Stars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #000;
    color: #e8eaf6;
    overflow-x: hidden;
  }

  /* Starfield canvas fills the screen */
  #starfield {
    position: fixed;
    inset: 0;
    display: block;
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>

<script>
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let shootingStars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    initStars();
  }

  function initStars() {
    const count = Math.floor((canvas.width * canvas.height) / 1800);
    stars = [];
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.4 + 0.2,
        baseAlpha: Math.random() * 0.4 + 0.5,
        twinkleSpeed: Math.random() * 0.06 + 0.02,
        twinkleAmount: Math.random() * 0.5 + 0.5,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function spawnShootingStar() {
    const startX = Math.random() * canvas.width;
    const startY = Math.random() * canvas.height * 0.4;
    shootingStars.push({
      x: startX, y: startY,
      len: Math.random() * 120 + 80,
      speed: Math.random() * 8 + 6,
      angle: Math.PI / 5,
      life: 1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // twinkling stars
    for (const s of stars) {
      s.phase += s.twinkleSpeed;
      const alpha = s.baseAlpha + Math.sin(s.phase) * s.twinkleAmount;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, Math.min(1, alpha))})`;
      ctx.fill();
    }

    // shooting stars
    for (let i = shootingStars.length - 1; i >= 0; i--) {
      const ss = shootingStars[i];
      const dx = Math.cos(ss.angle) * ss.len;
      const dy = Math.sin(ss.angle) * ss.len;
      const grad = ctx.createLinearGradient(ss.x, ss.y, ss.x - dx, ss.y - dy);
      grad.addColorStop(0, `rgba(255,255,255,${ss.life})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ss.x, ss.y);
      ctx.lineTo(ss.x - dx, ss.y - dy);
      ctx.stroke();

      ss.x += Math.cos(ss.angle) * ss.speed;
      ss.y += Math.sin(ss.angle) * ss.speed;
      ss.life -= 0.012;
      if (ss.life <= 0) shootingStars.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);

  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduceMotion) {
    resize();
    draw();
    setInterval(() => { if (Math.random() < 0.7) spawnShootingStar(); }, 2200);
  }
</script>
</body>
</html>
